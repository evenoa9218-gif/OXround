    const qs=QQ.filter(q=>q.topicId===t.id);
    const done=ts.c+ts.w+ts.n;
    return `<div class="tc" onclick="startTopic(${t.id})">
      <div class="tn">TOPIC ${t.id}</div>
      <div class="tt">${t.n}</div>
      <div class="ts">
        <span>${qs.length}문제</span>
        ${ta!==null?`<span class="${ta>=70?'ok':ta>=40?'wa':'er'}">${ta}%</span>`:''}
        ${ts.n>0?`<span style="color:#e65100">${ts.n}미응답</span>`:''}
      </div>
    </div>`;
  }).join('');

  r.innerHTML=`
  <div class="hdr">
    <div class="hdr-title">[채총] 유니온 MGI Point OX 퀴즈</div>
    <div class="hdr-count">총 ${tot}문제</div>
    <div style="font-size:12px;color:#aaa;margin-top:3px">학습자: ${currentUser} &nbsp;|&nbsp; <span style="cursor:pointer;text-decoration:underline" onclick="changeUser()">변경</span></div>
  </div>
  <div class="stat-row">
    <div class="sc"><div class="sv">${ov.c+ov.w}</div><div class="sl">응답</div></div>
    <div class="sc"><div class="sv ok">${ov.c}</div><div class="sl">정답</div></div>
    <div class="sc"><div class="sv er">${ov.w}</div><div class="sl">오답</div></div>
    <div class="sc"><div class="sv">${acc}%</div><div class="sl">정확도</div></div>
  </div>
  <div class="sec">TOPICS</div>
  <div class="tg">${tHtml}</div>
  <div class="ar">
    <button class="btn btn-p" onclick="startAll()">전체 학습 (${QQ.length}문제)</button>
    <button class="btn" onclick="startWrong()">오답 재도전</button>
    <button class="btn btn-d" onclick="confirmReset()">초기화</button>
  </div>`;
}

function changeUser(){
  currentUser='';
  sess=null;fb=null;
  renderLogin();
}

function startAll(){
  const qs=[...QQ].sort(()=>Math.random()-0.5);
  sess={qs,idx:0,done:false,res:[]};
  fb=null;
  render();
}

function startTopic(tid){
  const qs=QQ.filter(q=>q.topicId===tid).sort(()=>Math.random()-0.5);
  sess={qs,idx:0,done:false,res:[],tid};
  fb=null;
  render();
}

function startWrong(){
  const wids=Object.keys(st.qS).filter(id=>st.qS[id].last==='w').map(Number);
  if(!wids.length){alert('오답이 없습니다.');return;}
  const qs=QQ.filter(q=>wids.includes(q.id)).sort(()=>Math.random()-0.5);
  sess={qs,idx:0,done:false,res:[]};
  fb=null;
  render();
}

function renderQuiz(){
  const r=document.getElementById('root');
  const q=sess.qs[sess.idx];
  const tot=sess.qs.length;
  const pct=Math.round(sess.idx/tot*100);
  const t=T.find(x=>x.id===q.topicId);
  const fbHtml=fb?`<div class="fb ${fb.ok?'fbok':'fber'}">
    <div class="fbt">${fb.ok?'O (정답)':'X (오답)'} — 정답: ${q.answer?'O':'X'}</div>
    ${q.explanation?`<div class="fbe">${q.explanation}</div>`:''}
  </div>`:'';
  const btnHtml=fb?`<button class="btn btn-p" onclick="next()" style="width:100%">다음 →</button>`:`
    <div class="ab">
      <button class="bo" onclick="ans(true)">O</button>
      <button class="bx" onclick="ans(false)">X</button>
    </div>`;

  const filterHtml=`<div class="rv">
    ${['전체','O정답','X정답','오답'].map((l,i)=>{
      const on=sess.filter===i;
      return `<button class="rb${on?' on':''}" onclick="setFilter(${i})">${l}</button>`;
    }).join('')}
  </div>`;

  r.innerHTML=`
  <div class="hdr">
    <div class="hdr-title">[채총] 유니온 MGI Point OX 퀴즈</div>
    <div class="hdr-count">${sess.idx+1} / ${tot} &nbsp;|&nbsp; ${t?t.n:''}</div>
  </div>
  ${filterHtml}
  <div class="pb"><div class="pf" style="width:${pct}%"></div></div>
  <div class="pr"><span>${pct}%</span><span>${sess.idx}/${tot} 완료</span></div>
  <div style="height:10px"></div>
  <div class="qc">
    <div class="qt">Q${q.id} · TOPIC ${q.topicId}</div>
    <div class="qq">${q.text}</div>
    ${fbHtml}
  </div>
  ${btnHtml}
  <div style="height:14px"></div>
  <button class="btn" onclick="quit()" style="width:100%">목록으로</button>`;
}

function setFilter(f){
  if(!sess)return;
  const allQs=sess.tid?QQ.filter(q=>q.topicId===sess.tid):[...QQ];
  let filtered;
  if(f===0) filtered=[...allQs];
  else if(f===1) filtered=allQs.filter(q=>q.answer===true);
  else if(f===2) filtered=allQs.filter(q=>q.answer===false);
  else filtered=allQs.filter(q=>{
    const qs=st.qS[q.id];
    return qs&&qs.last==='w';
  });
  if(!filtered.length){alert('해당하는 문제가 없습니다.');return;}
  sess={...sess,qs:filtered.sort(()=>Math.random()-0.5),idx:0,done:false,res:[],filter:f};
  fb=null;
  render();
}

function ans(v){
  if(fb)return;
  const q=sess.qs[sess.idx];
  const ok=v===q.answer;
  fb={ok};

  if(!st.qS[q.id]) st.qS[q.id]={c:0,w:0,last:null,banks:[]};
  if(ok){st.qS[q.id].c++;st.ov.c++;}
  else{st.qS[q.id].w++;st.ov.w++;}
  st.qS[q.id].last=ok?'c':'w';

  const tid=q.topicId;
  if(!st.tS[tid]) st.tS[tid]={c:0,w:0,n:0};
  if(ok) st.tS[tid].c++; else st.tS[tid].w++;

  sess.res.push({q,ok});
  saveSt(st);
  render();
}

function next(){
  if(sess.idx+1>=sess.qs.length){
    sess.done=true;
    fb=null;
    render();
    return;
  }
  sess.idx++;
  fb=null;
  render();
}

function renderResult(){
  const r=document.getElementById('root');
  const tot=sess.res.length;
  const c=sess.res.filter(x=>x.ok).length;
  const w=tot-c;
  const acc=tot>0?Math.round(c/tot*100):0;
  const wrongs=sess.res.filter(x=>!x.ok);
  const wHtml=wrongs.map(({q})=>`
    <div class="wi">
      <div>Q${q.id}. ${q.text}</div>
      <div class="wa2">정답: ${q.answer?'O':'X'}${q.explanation?' — '+q.explanation:''}</div>
    </div>`).join('');

  r.innerHTML=`
  <div class="hdr"><div class="hdr-title">[채총] 유니온 MGI Point OX 퀴즈</div></div>
  <div style="text-align:center;padding:30px 0 20px">
    <div class="rp">${acc}%</div>
    <div class="rm">${tot}문제 중 ${c}개 정답</div>
    <div class="rg">
      <div class="sc"><div class="sv ok">${c}</div><div class="sl">정답</div></div>
      <div class="sc"><div class="sv er">${w}</div><div class="sl">오답</div></div>
      <div class="sc"><div class="sv">${acc}%</div><div class="sl">정확도</div></div>
    </div>
  </div>
  ${wrongs.length?`<div class="sec">오답 목록</div><div class="wl">${wHtml}</div>`:''}
  <div class="ar">
    <button class="btn btn-p" onclick="fin()">목록으로</button>
    <button class="btn" onclick="retry()">다시 풀기</button>
  </div>
  <button class="rst" onclick="confirmReset()">학습 기록 초기화</button>`;
}

function fin(){sess=null;fb=null;render();}
function retry(){const qs=[...sess.qs].sort(()=>Math.random()-0.5);sess={qs,idx:0,done:false,res:[]};fb=null;render();}
function quit(){fin();}
function confirmReset(){
if(confirm('이 과목의 학습 기록을 초기화하시겠습니까?')){
st=cp(DS);saveSt(st);sess=null;fb=null;render();
}
}

init();

</script>
</body>
</html>
