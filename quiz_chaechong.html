Q(52,4,‘수인의 물상보증인이 있고 각 부동산에 제3취득자가 있는 경우, 제3취득자 중 1인이 대위변제하면 다른 제3취득자에게 각 부동산 가액 비례로 대위행사할 수 있다.’,true,’’),
Q(53,4,‘물상보증인이 대위변제한 경우 채무자 부동산의 제3취득자에 대해 대위할 때 출재한 전액으로 행사하며 각 부동산 가액 비례로 제한되지 않는다.’,true,’’),
Q(54,4,‘보증인이 채무를 변제한 후 제3취득자가 부동산을 취득한 경우, 보증인은 미리 대위의 부기등기를 하지 않은 한 대위할 수 없다.’,true,’’),
Q(55,4,‘제3취득자가 부동산을 취득한 후 보증인이 변제한 경우, 보증인은 부기등기 없이도 대위할 수 있다.’,true,’’),
Q(56,4,‘물상보증인이 피담보채무를 면책적으로 인수한 경우 채무자에 대한 구상권을 취득한다.’,false,‘면책적 채무인수 시 물상보증인은 채무자에 대한 구상권을 취득하지 못한다.’),
Q(57,4,‘물상보증인의 변제자대위권 행사 시, 변제 후 부기등기 전 취득한 제3취득자에 대해서는 대위할 수 없다.’,true,’’),
Q(58,4,‘제3취득자의 물상보증인에 대한 변제자대위권 행사는 불가능하다.’,true,’’),
Q(59,4,‘이해관계 있는 제3자는 채무자의 의사에 반하여도 변제할 수 있다.’,true,’’),
Q(60,4,‘변제할 정당한 이익 있는 자가 근저당권 피담보채무 일부를 대위변제한 경우, 채권자는 일부 대위변제자에 대해 우선변제권을 가진다.’,true,’’),
Q(61,4,‘물상보증인과 보증인 간에는 각 재산 가액에 비례하여 채권자를 대위한다.’,false,‘인원수에 비례하여 채권자를 대위한다.’),
Q(62,4,‘물상보증인 사이는 보증인의 부담 부분을 제외한 잔액에 대해 각 재산 가액에 비례하여 채권자를 대위한다.’,true,’’),
Q(63,4,‘채권자의 담보상실·감소행위에서 담보상실에는 인적담보의 상실도 포함된다.’,true,’’),
Q(64,4,‘대위변제자와 채무자 간의 구상금 지연손해금 약정은 변제자대위권 행사에도 적용된다.’,false,‘구상금에 관한 지연손해금 약정은 변제자대위권 행사에는 적용되지 않는다.’),
Q(65,4,‘채무자로부터 담보부동산을 취득한 제3취득자는 채무를 변제하거나 담보권 실행으로 소유권을 잃더라도 물상보증인에 대하여 채권자 대위가 불가능하다.’,true,’’),
Q(66,4,‘후순위 근저당권자는 보증인에 대하여 채권자를 대위할 수 있다.’,true,’’),
Q(67,4,‘보증인은 후순위 근저당권을 취득한 제3취득자에 대해 부기등기 없이도 채권자를 대위할 수 있다.’,true,’’),
Q(68,4,‘변제할 정당한 이익 있는 자가 근저당권 피담보채무 일부를 대위변제한 경우, 부기등기 경료 여부와 관계없이 채권자가 가졌던 채권 및 담보에 관한 권리를 취득한다.’,true,’’),
Q(69,4,‘물상보증인이 구상권이 없는 경우에는 채권자를 대위하여 채권자의 채권 및 담보에 관한 권리를 행사할 수 없다.’,true,’’),
Q(70,4,‘공동저당권 설정 채권자가 채무자 소유 부동산에 대한 담보를 포기한 경우, 물상보증인 소유 부동산의 후순위 근저당권자보다 물상보증인이 우선하여 배당받을 수 있다.’,false,‘물상보증인이 면책을 주장할 수 있는 한도에서도 물상보증인 소유 부동산의 후순위 근저당권자에 우선하여 배당받을 수 없다.’),
Q(71,4,‘연대보증인이 주채무를 변제하면 채권자가 주채무자 및 다른 연대보증인에게 갖고 있던 채권 및 담보권이 연대보증인에게 법률상 당연히 이전한다.’,true,’’),
Q(72,4,‘공동저당권의 피담보채무에 관해 물상보증인 소유 부동산에 후순위로 설정된 담보가등기권리자는 변제할 정당한 이익이 있는 자에 해당한다.’,false,‘후순위 담보가등기권리자는 변제할 정당한 이익 있는 자에 해당하지 않는다.’),
Q(73,5,‘일부공탁은 채무의 일부를 소멸시키는 효과가 있다.’,false,‘일부공탁은 유효한 변제가 아니고 채무의 일부 소멸 효과도 없다.’),
Q(74,5,‘채권의 준점유자 변제가 유효하려면 변제자는 선의·무과실이어야 한다.’,true,’’),
Q(75,5,‘무효인 채권압류 및 전부명령을 받은 자에 대한 변제도 선의·무과실이면 채권의 준점유자에 대한 변제로서 유효하다.’,true,’’),
Q(76,5,‘단축급부에서 계약당사자는 제3자에 대해 부당이득반환청구를 할 수 없다.’,true,’’),
Q(77,5,‘특정물의 인도는 채권성립 당시 그 물건이 있었던 장소에서 하여야 한다.’,true,’’),
Q(78,5,‘채권자가 무권한자의 변제수령을 사후에 추인한 경우는 채권자가 이익을 받은 경우에 해당한다.’,true,’’),
Q(79,5,‘병존적 채무인수자는 변제할 정당한 이익이 있는 자에 해당한다.’,true,’’),
Q(80,5,‘변제공탁에서 채권자를 알 수 없는 경우 판단 기준은 선관주의 여부이다.’,true,’’),
Q(81,5,‘장래의 채무나 불확정채무도 변제공탁의 대상이 된다.’,false,‘장래의 채무나 불확정채무는 변제공탁의 대상이 아니다.’),
Q(82,5,‘이행거절이 명백한 경우 이행제공 없이 변제공탁이 가능하다.’,true,’’),
Q(83,5,‘변제공탁이 적법한 경우 공탁물출급청구 여부와 무관하게 공탁으로 변제의 효력이 발생한다.’,true,’’),
Q(84,5,‘공탁물출급청구권에 대한 압류는 공탁물회수청구권에 영향을 미친다.’,false,‘공탁물출급청구권에 대한 압류는 공탁물회수청구권에 영향을 미치지 않는다.’),
Q(85,6,‘채무자가 채권자의 승낙을 얻어 부동산으로 대물변제 하였으나 본래의 채무가 존재하지 않았던 경우, 특별한 의사표시가 없는 한 대물변제는 무효이다.’,true,’’),

Q(88,6,‘경개계약의 합의해제는 가능하다.’,true,’’),
Q(89,6,‘선순위 저당권, 후순위 저당권, 가압류등기가 순서대로 존재할 때 후순위 저당권자가 소유권을 취득하면 후순위 저당권은 혼동으로 소멸하지 않는다.’,true,’’),
Q(90,6,‘점유권은 혼동소멸의 대상이 된다.’,false,‘점유권은 혼동소멸의 대상이 아니다.’),
Q(91,6,‘유치권자가 소유권을 취득하면 유치권은 혼동으로 소멸한다.’,true,’’),
Q(92,6,‘대항임차권자가 소유권을 취득한 경우 후순위 저당권이 있어도 임차권이 혼동으로 소멸한다.’,false,‘후순위 저당권이 있는 경우에는 임차권이 혼동으로 소멸하지 않는다.’),
Q(93,6,‘담보책임을 기초로 한 손해배상채권의 제척기간이 지났으나 제척기간 전 상계할 수 있었던 경우 민법 제495조 유추적용으로 상계가 가능하다.’,true,’’),
Q(94,6,‘이자부 금전소비대차에서 변제기 전 변제 시 약정이자를 함께 제공하지 않으면 채권자는 수령을 거절할 수 있다.’,true,’’),
Q(95,6,‘부동산 대물변제예약 후 등기 전 기존채무가 소멸된 경우 소유권이전등기를 청구할 수 없다.’,true,’’),
Q(96,6,‘채권양도 전 이미 양 채권의 변제기가 도래한 경우 상계의 효력은 채권양도의 대항요건이 갖추어진 시점으로 소급한다.’,true,‘변제기로 소급하지 않고 채권양도 대항요건 갖추어진 시점으로 소급한다.’),
Q(97,6,‘근저당권이 확정되면 그 이후 발생하는 원금채권은 해당 근저당권에 의해 담보되지 않는다.’,true,’’),
Q(98,6,‘채권양도통지와 가압류명령이 동시도달한 경우 채권양수인과 가압류채권자는 채권액 비율에 따른 정산의무를 진다.’,true,’’),
Q(99,6,‘소액임차인의 지위를 겸하는 대항요건과 확정일자를 갖춘 임차인은 소액임차인으로서 먼저 배당받은 후 순위에 따라 배당받는다.’,true,’’),
Q(100,6,‘가압류채권자·근저당권자·경매신청압류채권자 배당 시 1차로 평등배당 후 2차로 근저당권자가 만족할 때까지 경매신청압류채권자 배당액에서 배당한다.’,true,’’),
Q(101,6,‘연대보증인 변제 후 제3취득자의 등기 전에 보증인에게 근저당권 일부가 이전등기 되었다면 연대보증인은 제3취득자에게 채권자를 대위할 수 있다.’,true,’’),
Q(102,6,‘경매에서 매수인은 매각대금을 완납한 때에 매각의 목적인 권리를 취득한다.’,true,’’),
Q(103,7,‘이행지체를 이유로 계약을 해제할 때 최고는 반드시 미리 일정기간을 명시하여야 한다.’,false,‘일정기간을 반드시 명시할 필요는 없다.’),
Q(104,7,‘기한이익 상실의 특약은 형성권적 기한이익 상실의 특약으로 추정한다.’,true,’’),
Q(105,7,‘채권가압류가 있어도 이행기가 도래하면 제3채무자는 지체책임을 면할 수 없다.’,true,’’),
Q(106,7,‘불법행위로 인한 손해배상채무의 지연손해금은 원칙적으로 불법행위 시부터 발생한다.’,true,’’),
Q(107,7,‘금전채무의 확정된 지연손해금채무는 이행청구를 받은 때부터 지체책임을 진다.’,true,’’),
Q(108,7,‘쌍무계약에서 일방이 상대방을 이행지체에 빠트리기 위해서는 계속적 이행제공이 필요하다.’,true,’’),
Q(109,7,‘토지거래허가를 받지 않아 유동적 무효인 계약에서 이행지체를 이유로 계약해제가 가능하다.’,false,‘유동적 무효 계약에서는 이행지체를 이유로 한 계약해제 및 손해배상청구가 불가능하다.’),
Q(110,7,‘불확정기한부 채무에서 사실 발생이 불가능해진 경우에도 이행기한이 도래한 것으로 간주한다.’,true,’’),
Q(111,7,‘특정물 매매에서 매수인의 대금지급채무가 이행지체에 빠진 경우에도 목적물이 인도될 때까지 매수인은 매매대금의 이자를 지급할 필요가 없다.’,true,’’),
Q(112,7,‘정지조건부 기한이익 상실 특약은 일정한 사유가 발생하면 채권자의 청구 없이 당연히 이행기가 도래한다.’,true,’’),
Q(113,7,‘형성권적 기한이익 상실 특약은 일정한 사유가 발생한 후 채권자의 의사가 있어야 이행기가 도래한다.’,true,’’),
Q(114,7,‘기한의 정함이 없는 채권을 양수한 채권양수인이 이행의 소를 제기하고 소송 중 채권양도통지가 도달된 경우 양도통지 도달 다음날부터 지체책임이 발생한다.’,true,’’),
Q(115,7,‘약속어음의 지급기일 전에 지급정지사유로 지급거절된 경우 그 때 물품대금 지급채무의 이행기가 도래한다.’,false,‘지급거절되었더라도 지급기일 전에 물품대금 지급채무의 이행기가 도래하는 것은 아니다.’),
Q(116,7,‘계약무효의 경우 반환의무는 성질상 부당이득 반환의무이며 악의의 수익자는 법정이자를 붙여 반환해야 한다.’,true,’’),
Q(117,7,‘매매 대상 부동산에 이미 처분금지가처분등기가 경료된 경우 이행불능에 해당한다.’,false,‘처분금지가처분등기만으로는 바로 이행불능이 되지 않는다.’),
Q(118,7,‘동시이행관계에 있는 쌍방 채무 중 어느 한 채무가 이행불능 됨으로 인하여 발생한 손해배상채무는 여전히 다른 채무와 동시이행관계에 있다.’,true,’’),

Q(195,10,‘임대차 존속 중 소멸시효가 완성된 연체 차임은 민법 제495조 유추적용으로 임대차보증금에서 공제할 수 있다.’,true,’’),
Q(196,10,‘채권의 일부 양도 후 채무자는 분할된 채권에 대해 양도인을 포함한 각 분할채권자 중 누구라도 상계의 상대방으로 지정하여 상계할 수 있다.’,true,’’),
Q(197,10,‘지급금지명령 후 취득한 채권도 수동채권인 피압류채권과 동시이행관계에 있는 경우에는 자동채권으로 상계가 가능하다.’,true,’’),
Q(198,10,‘주채무자가 사전에 담보제공청구권의 항변권을 포기한 경우 보증인은 사전구상권을 자동채권으로 상계할 수 있다.’,true,’’),
Q(199,11,‘채권자대위권 행사에서 피보전채권이 이행기에 도래하지 않아도 보전의 필요성이 인정되면 대위권을 행사할 수 있다.’,false,‘피보전채권의 이행기도 도래하여야 한다.’),
Q(200,11,‘유류분반환청구권은 채권자대위권의 피대위권리가 될 수 없다.’,true,’’),
Q(201,11,‘채권자대위권 행사의 통지 이후 채무자의 합의해제는 채권자에게 대항할 수 없다.’,true,’’),
Q(202,11,‘채권자대위권 행사의 통지 이후 채무자의 법정해제는 채권자에게 대항할 수 없다.’,false,‘법정해제는 처분행위에 해당하지 않으므로 채권자에게 대항할 수 있다.’),
Q(203,11,‘채권자대위소송의 기판력은 채권자와 채무자 사이에 발생한다.’,false,‘기판력은 채권자와 채무자 사이에 발생하지 않는다.’),
Q(204,11,‘채권자대위소송에서 피보전채권의 소멸시효 완성의 항변은 제3채무자가 주장할 수 없다.’,true,’’),
Q(205,11,‘채권자는 채권자대위소송에서 자신과 제3채무자 사이의 독자적 사정에 기한 사유를 주장할 수 없다.’,true,’’),
Q(206,11,‘금전채권자가 채권자대위권을 행사하여 공유물분할 청구권을 행사하는 것은 원칙적으로 허용된다.’,false,‘원칙적으로 허용되지 않는다.’),
Q(207,11,‘채권자대위소송 중 다른 채권자가 대위권을 행사하면서 공동소송참가신청을 하는 경우 양 청구의 소송물이 동일하다면 적법하다.’,true,’’),
Q(208,11,‘채권자대위권의 행사는 법정위임관계로서 대위채권자는 채무자에게 비용상환청구를 할 수 있다.’,true,’’),
Q(209,11,‘채권자대위권행사 통지 후 채무자가 제3채무자로부터 변제를 수령하는 것은 처분행위이므로 허용되지 않는다.’,false,‘변제의 수령은 처분행위에 해당하지 않으므로 허용된다.’),
Q(210,11,‘이혼으로 인한 재산분할청구권의 협의·심판 전에는 채권자대위권 행사가 불가능하다.’,true,’’),
Q(211,11,‘채권자대위소송에서 채무자의 무자력이 인정되지 않는다면 법원은 소를 각하한다.’,true,’’),
Q(212,11,‘수임인이 대변제청구권을 보전하기 위하여 채무자의 채권을 대위행사하는 경우 채무자의 무자력이 필요하다.’,false,‘수임인의 대변제청구권 보전을 위한 대위행사는 채무자 무자력이 불필요하다.’),
Q(213,11,‘채권자대위소송으로 채권자 자신에게 채권양도절차를 이행하도록 청구할 수 있다.’,false,‘채권자 자신에게 채권양도절차를 이행하도록 청구하는 것은 허용되지 않는다.’),
Q(214,11,‘채권자대위소송 중 채무자가 동일한 내용의 소송을 제기한 경우 중복제소금지 원칙 위반이다.’,true,’’),
Q(215,11,‘채무자가 채권자대위소송 제기 사실을 알았을 경우 채권자대위소송의 기판력이 채무자에게 미친다.’,true,’’),
Q(216,11,‘물권적 청구권도 채권자대위권의 피보전권리가 될 수 있다.’,true,’’),
Q(217,11,‘미등기 매수인이 매도인을 대위하여 불법점유자에게 자기에게 인도청구를 할 수 있다.’,true,’’),
Q(218,11,‘채권자대위소송의 항소심에서 소취하 후, 위 소송을 알고 있는 채무자가 제3채무자를 상대로 소를 제기하는 것은 재소금지규정에 저촉된다.’,true,’’),
Q(219,11,‘채권자대위소송에서 피보전채권 부존재로 각하판결이 확정된 경우 이후 채권자의 채무자에 대한 소송에 기판력이 미친다.’,false,‘기판력이 미치지 않는다.’),
Q(220,11,‘이행인수계약에서 인수인이 채무를 이행하지 않는 경우 채권자는 채무자의 인수인에 대한 청구권을 대위행사할 수 있다.’,true,’’),
Q(221,11,‘채권자대위소송의 제기로 인한 소멸시효 중단의 효과는 채무자에게 생긴다.’,true,’’),
Q(222,11,‘법원이 채권자대위권을 행사하는 채권자에게 직접 말소등기 절차를 이행할 것을 명한 경우 위법하다.’,false,‘위법하지 않다.’),
Q(223,11,‘채권자대위소송에서 채권자가 승소판결이 확정된 경우 제3채무자는 해당 청구권의 취득이 강행법규 위반으로 무효인 경우에는 그 존재를 다툴 수 있다.’,true,’’),
Q(224,11,‘대위채권자의 채권자가 채권자대위소송 확정판결에 따른 채권자의 제3채무자에 대한 채권에 대해 받은 압류명령·전부명령은 모두 무효이다.’,true,’’),
Q(225,11,‘채권자취소소송에서 피보전채권의 소멸시효가 완성된 경우 수익자는 소멸시효 원용권자에 해당한다.’,true,’’),
Q(226,11,‘채권자대위소송에서 채무자가 안 후에 행한 채무자의 변제수령은 처분행위에 해당하지 않는다.’,true,’’),
Q(227,11,‘채권자대위소송에서 제3채무자는 채무자에 대해 가지는 항변사유로 채권자에게 대항할 수 있다.’,true,’’),
Q(228,11,‘채권자대위소송에서 제3채무자는 채무자의 채권자에 대한 항변사유도 주장할 수 있다.’,false,‘채무자의 채권자에 대한 항변사유는 제3채무자가 주장할 수 없다.’),
Q(229,11,‘사해행위취소소송에서 수익자는 채무자에 대한 자동채권으로 채권자에게 상계를 주장하여 안분액 지급을 거절할 수 없다.’,true,’’),
Q(230,11,‘제척기간 내 사해행위취소의 소를 제기하였다가 제척기간 경과 후 보전채권을 변경하는 것은 공격방법에 관한 주장 변경에 불과하여 적법하다.’,true,’’),
Q(231,12,‘부동산 이중매매로 인한 가액 상당의 손해배상채권은 채권자취소권의 피보전채권이 된다.’,false,‘이중매매로 인한 손해배상채권은 피보전채권이 되지 않는다.’),
Q(232,12,‘피보전채권의 액수 범위에 대한 구체적 확정이 필요하다.’,false,‘피보전채권의 액수 범위 구체적 확정은 불요하다.’),
Q(233,12,‘피보전채권에는 사실심 변론종결시까지의 이자·지연손해금도 포함된다.’,true,’’),
Q(234,12,‘유일한 부동산 매도 후 발생한 신용카드 대금채권은 채권자취소소권의 피보전채권이 될 수 없다.’,true,’’),
Q(235,12,‘사해행위 이전에 성립한 채권이 사해행위 이후에 양도된 경우 채권 양수인은 채권자취소소권을 행사할 수 없다.’,false,‘사해행위 이전에 성립한 채권이 양도된 경우 채권 양수인도 채권자취소소권을 행사할 수 있다.’),
Q(236,12,‘특정채권의 보전을 위한 채권자취소소권 행사가 가능하다.’,false,‘특정채권의 보전을 위한 채권자취소소권 행사는 불가하다.’),
Q(237,12,‘채무자의 악의(사해의사)는 채권자가 증명하여야 한다.’,true,’’),
Q(238,12,‘유일한 재산을 처분하는 경우 채무자의 사해의사는 추정된다.’,true,’’),
Q(239,12,‘채무자의 악의가 입증되면 수익자 또는 전득자의 악의는 추정된다.’,true,’’),
Q(240,12,‘사해의사는 특정채권자에 대한 사해의사까지 요구된다.’,false,‘사해의사는 특정채권자에 대한 사해의사까지 요구하지 않는다.’),
Q(241,12,‘사해행위를 취소하기 위해서는 채무자의 무자력 상태가 사해행위시부터 사실심 변론종결시까지 계속되어야 한다.’,true,’’),
Q(242,12,‘사실심 변론종결시까지 채무자가 자력을 회복하면 사해행위의 소는 기각된다.’,true,’’),
Q(243,12,‘수익자나 전득자의 악의 판단대상은 수익자와 전득자 사이의 법률행위이다.’,false,‘수익자나 전득자의 악의 판단대상은 수익자와 채무자 사이의 법률행위이다.’),
Q(244,12,‘채무자 재산에 부동산 가액을 초과하는 채권최고액의 근저당권이 설정되어 있는 경우에도 사해행위가 성립할 수 있다.’,false,‘저당권의 우선변제권 범위가 부동산 가격을 초과하는 경우 사해행위가 성립하지 않는다.’),
Q(245,12,‘근저당권의 경우 피담보채권액 판단 기준은 채권최고액이다.’,false,‘근저당권의 경우 피담보채권액은 채권최고액이 아닌 실제로 이미 발생하여 있는 채권금액이다.’),
Q(246,12,‘채무초과 상태에서의 소멸시효 이익 포기행위는 사해행위에 해당한다.’,true,’’),
Q(247,12,‘상속포기는 사해행위 취소의 대상이 된다.’,false,‘상속포기는 사해행위 취소의 대상이 아니다. 상속재산 분할협의는 대상이 된다.’),
Q(248,12,‘상속재산 분할협의는 사해행위 취소의 대상이 된다.’,true,’’),
Q(249,12,‘수급인의 저당권설정청구권 행사에 의한 도급인의 저당권 설정행위는 사해행위이다.’,false,‘수급인의 저당권설정청구권 행사에 의한 도급인의 저당권 설정행위는 사해행위가 아니다.’),
Q(250,12,‘우선변제권 있는 채권자에게 대물변제로 제공한 것은 사해행위이다.’,false,‘우선변제권 있는 채권자에게 대물변제로 제공한 것은 사해행위가 아니다.’),
Q(251,12,‘채권자취소권의 행사방법은 법원에 소를 제기하는 방법으로만 가능하다.’,true,’’),
Q(252,12,‘채권자취소소송의 피고적격은 수익자 또는 전득자이며 채무자는 포함되지 않는다.’,true,’’),
Q(253,12,‘전득자를 상대로 사해행위취소의 소를 제기한 경우 취소의 대상은 수익자와 전득자 사이의 법률행위이다.’,false,‘취소의 대상은 채무자와 수익자 사이의 법률행위이다.’),
Q(254,12,‘채권자취소소송에서 피보전채권이 인정되지 않으면 소를 각하한다.’,false,‘채권자취소소송에서 피보전채권의 존재는 본안판단 사항이므로 인정되지 않으면 청구기각이다.’),
Q(255,12,‘여러 명의 채권자가 동시에 사해행위취소소송을 제기하여도 중복소송이 아니다.’,true,’’),
Q(256,12,‘사해행위취소소송에서 피보전채권의 추가·교환은 청구변경에 해당한다.’,false,‘청구변경이 아니라 공격방법의 변경에 해당한다.’),
Q(257,12,‘사해행위취소소송의 원상회복청구 패소가 예상된다는 이유로 소의 이익을 부정할 수 없다.’,true,’’),
Q(258,12,‘사해행위 후 채권자가 취소원인을 알면서 피보전채권을 양도한 경우 제척기간 판단 기준은 채권양도인이 취소원인을 안 날이다.’,true,’’),
Q(259,12,‘채권자가 채무자의 채권자취소소권을 대위행사하는 경우 제척기간은 채권자를 기준으로 판단한다.’,false,‘제척기간은 채무자를 기준으로 판단한다.’),
Q(260,12,‘채권자취소소권의 제척기간은 취소원인을 안 날로부터 1년, 법률행위 있은 날로부터 5년이다.’,true,’’),
Q(261,12,‘사해행위의 취소가 제척기간 내에 행사되었다면 원상회복청구는 기간 도과 후에도 가능하다.’,true,’’),
Q(262,12,‘사해행위 후 제3자가 목적물에 저당권을 취득한 경우 원물반환이 원칙이고 가액배상을 구할 수 없다.’,false,‘원물반환 대신 가액 상당의 배상을 구할 수 있다.’),
Q(263,12,‘채권자가 스스로 위험이나 불이익을 감수하면서 원물반환을 구하는 것도 허용된다.’,true,’’),
Q(264,12,‘원물반환과 가액배상이 모두 가능한 경우 원상회복청구권은 법원의 직권으로 확정된다.’,false,‘사실심 변론종결 당시 채권자의 선택에 따라 확정된다.’),
Q(265,12,‘가액배상 산정 기준시는 사실심 변론종결시이다.’,true,’’),
Q(266,12,‘수 개의 부동산(모두 채무자 소유)에 공동저당권이 설정된 경우 각 부동산의 가액에 비례하여 피담보채권을 안분한 금액을 공제한다.’,true,’’),
Q(267,12,‘수 개의 부동산 중 일부가 물상보증인 소유인 경우 각 부동산의 가액에 비례하여 피담보채권을 안분한다.’,false,‘채무자 소유의 부동산이 공동저당권의 피담보채권액 전액을 부담한다.’),
Q(268,12,‘사해행위의 취소와 원상회복은 모든 채권자의 이익을 위하여 효력이 있으므로 취소채권자에게 우선권이 있다.’,false,‘취소채권자의 우선권은 없다.’),
Q(269,12,‘가액배상의무에 대한 이행지체 책임은 판결 확정 다음날부터 발생한다.’,true,’’),
Q(270,12,‘여러 채권자가 가액배상을 청구하는 경우 법원이 반환을 명하여야 하는 금액은 각 채권자의 채권액에 비례하여 안분한 범위 내이다.’,false,‘각 채권자의 피보전채권액 전액 범위 내에서 반환을 명하여야 한다.’),
Q(271,12,‘수익자가 채무자의 채권자인 경우 가액배상을 할 때 자기채권에 대한 안분액의 분배를 청구할 수 있다.’,false,‘수익자는 취소채권자에 대하여 안분액의 분배 청구를 할 수 없다.’),
Q(272,12,‘취소채권자의 가액배상청구권과 수익자의 채무자에 대한 채권과의 상계 주장은 허용된다.’,false,‘이 경우 상계 주장은 허용되지 않는다.’),
Q(273,12,‘원물반환청구 승소판결 확정 후 원물반환의 목적을 달성할 수 없게 된 경우 다시 가액배상을 청구할 수 없다.’,true,’’),
Q(274,12,‘사해행위 취소로 인한 법률관계는 채무자와 수익자 사이에도 영향을 미친다.’,false,‘채무자와 수익자 사이에는 영향이 없다.’),
Q(275,12,‘수익자 소유 부동산 경매에서 취소채권자가 가액배상판결에 기하여 배당을 받은 경우 그 배당액은 취소채권자에게 귀속된다.’,false,‘그 배당액은 취소채권자에게 귀속되지 않고 채무자의 책임재산으로 회복된다.’),
Q(276,12,‘사해행위 취소로 회복된 부동산을 채무자가 제3자에게 처분한 것은 무권리자의 처분으로 무효이다.’,true,’’),
Q(277,12,‘사해행위 취소 시 수익자는 채무자에 대하여 부당이득반환청구권을 행사할 수 있다.’,true,’’),
Q(278,12,‘사해행위 취소 후 수익자가 취득한 부당이득반환채권으로 원상회복된 부동산에 대한 강제경매절차에서 배당을 요구할 수 있다.’,false,‘사해행위 취소 후 취득한 부당이득반환채권으로는 배당 요구를 할 수 없다.’),
Q(279,12,‘말소등기판결을 받은 채권자가 말소를 마치지 않은 상태에서 소송 당사자가 아닌 다른 채권자가 채무자를 대위하여 말소등기를 신청할 수 없다.’,true,’’),
Q(280,12,‘채권자가 어느 수익자에 대하여 승소판결을 받았더라도 재산이나 가액의 회복을 마치지 아니한 경우 다른 수익자에 대하여 별도로 청구할 수 있다.’,true,’’),
Q(281,12,‘채권자가 수익자를 상대로 사해행위 취소 승소판결이 확정된 경우 그 판결의 효력은 전득자에게도 미친다.’,false,‘판결의 효력은 소송의 당사자가 아닌 전득자에게 미치지 않는다.’),
Q(282,12,‘사해행위인 매매예약에 기하여 가등기 및 본등기까지 마친 경우 채권자는 수익자를 상대로 매매예약의 취소청구를 할 수 있다.’,true,’’),
Q(283,12,‘사해행위인 근저당권설정계약에 기한 근저당권설정등기가 경락으로 인하여 말소된 경우 채권자는 더 이상 근저당권설정계약의 취소를 구할 이익이 없다.’,false,‘채권자는 여전히 근저당권설정계약의 취소를 구할 이익이 있다.’),
Q(284,12,‘채무자의 채권양도가 사해행위로 취소된 경우 채권자는 채무자를 대위하여 제3채무자에게 채권에 관한 지급청구를 할 수 없다.’,true,’’),
Q(285,13,‘건물 공유자들의 무단점유자에 대한 차임 상당 부당이득반환청구권은 불가분채권이다.’,false,‘불가분채권이 아니다.’),
Q(286,13,‘불가분채권자 중 1인을 집행채무자로 한 압류 및 전부명령이 있는 경우 다른 불가분채권자는 여전히 채무 전부의 이행을 청구할 수 있다.’,true,’’),
Q(287,13,‘공동상속인의 건물철거의무는 지분 한도 내에서 건물 전체에 대해 불가분채무이다.’,true,’’),
Q(288,13,‘수인이 공동으로 법률상 원인 없이 타인의 재산을 사용한 경우의 부당이득반환채무는 불가분채무이다.’,true,’’),
Q(289,13,‘임대부동산 공유자들의 임대차보증금반환의무는 불가분채무이다.’,true,’’),
Q(290,13,‘연대채무자에 대한 법률행위의 무효는 다른 연대채무자의 채무에 영향을 미친다.’,false,‘다른 연대채무자의 채무에 영향을 미치지 않는다.’),
Q(291,13,‘연대채무자의 상계권 행사는 다른 연대채무자에게 절대적 효력이 발생한다.’,true,’’),
Q(292,13,‘상계할 채권이 있는 연대채무자가 상계하지 아니한 때 다른 연대채무자는 그 채무자의 부담부분에 한하여 상계할 수 있다.’,true,’’),
Q(293,13,‘연대채무자는 자기 부담 부분 이상을 변제하지 않았더라도 다른 연대채무자에게 구상권을 행사할 수 있다.’,true,’’),
Q(294,13,‘연대채무자의 구상 시 부담 부분은 불균등한 것으로 추정한다.’,false,‘균등한 것으로 추정한다.’),
Q(295,13,‘연대채무자 1인에 대한 압류로 인한 시효중단은 다른 연대채무자에게 미친다.’,false,‘다른 연대채무자에게 미치지 않는다.’),
Q(296,13,‘부진정연대채무자 중 1인에 대한 채무면제는 절대적 효력이다.’,false,‘상대적 효력이다.’),
Q(297,13,‘부진정연대채무에서 상계의 효력은 절대적이다.’,true,’’),
Q(298,13,‘공동불법행위자 중 1인이 자기의 부담 부분 이상을 변제하여 공동의 면책을 얻게 한 경우 다른 공동불법행위자에게 구상권을 행사할 수 있다.’,true,’’),
Q(299,13,‘구상의무를 부담하는 다른 공동불법행위자가 수인인 경우 구상채무는 원칙적으로 분할채무이다.’,true,’’),
Q(300,13,‘구상권자인 공동불법행위자 측에 과실이 없는 경우 구상채무는 부진정연대채무이다.’,true,’’),
Q(301,13,‘피해자의 공동불법행위자에 대한 손해배상채권이 시효로 소멸한 경우 다른 공동불법행위자의 구상권도 소멸한다.’,false,‘다른 공동불법행위자의 구상권은 소멸하지 않는다.’),
Q(302,13,‘금전채무와 같이 급부의 내용이 가분인 채무가 공동상속된 경우 상속재산 분할의 대상이 된다.’,false,‘상속개시와 동시에 법정상속분에 따라 분할되어 귀속되며 상속재산 분할의 대상이 아니다.’),
Q(303,13,‘공동불법행위자 중 1인에 대한 보증인이 채무를 변제한 경우 다른 부진정연대채무자에 대해 구상권을 행사할 수 있다.’,true,’’),
Q(304,13,‘공동불법행위자는 자기 부담부분을 변제하지 않아도 부담비율에 따라 다른 공동불법행위자에게 구상권을 행사할 수 있다.’,false,‘공동불법행위자는 자기의 부담 부분 이상을 변제하여야 구상권을 행사할 수 있다.’),
Q(305,14,‘주채무자에게 생긴 사유는 모두 보증인에게 효력이 미친다.’,true,’’),
Q(306,14,‘주채무가 시효완성으로 소멸된 경우 보증채무도 당연히 소멸한다.’,true,’’),
Q(307,14,‘주채무자에 대한 채권이 이전되면 특약이 없는 한 보증채권도 이전된다.’,true,’’),
Q(308,14,‘주채권의 양도에 대한 대항요건을 갖춘 경우 보증채권에 대하여도 별도의 대항요건을 구비하여야 한다.’,false,‘보증채권에 대하여 대항요건은 필요 없다.’),
Q(309,14,‘보증채무의 이행지체로 인한 지연손해금은 보증채무와 별도로 부담한다.’,true,’’),
Q(310,14,‘보증채무에 관한 연체이율에 주채무에 약정된 연체이율이 당연히 적용된다.’,false,‘주채무에 약정된 연체이율이 당연히 적용되지 않는다.’),
Q(311,14,‘민법상 보증의사 표시는 기명날인 또는 서명 있는 서면으로 하여야 한다.’,true,’’),
Q(312,14,‘보증인의 기명날인은 타인이 대행할 수 있다.’,true,’’),
Q(313,14,‘보증인의 서명은 타인이 대행할 수 있다.’,false,‘보증인의 서명은 오직 보증인 본인이 직접 하여야 한다.’),
Q(314,14,‘보증인 보호를 위한 특별법은 물상보증의 경우에도 적용된다.’,false,‘보증인 보호를 위한 특별법은 물상보증의 경우 적용되지 않는다.’),
Q(315,14,‘주채무의 소멸시효가 완성되면 보증채무는 부종성에 의하여 소멸한다.’,true,’’),
Q(316,14,‘보증인이 작성한 보증채무 이행각서로 보증채무의 부종성을 부정할 수 있다.’,false,‘이행각서만으로 부종성을 부정할 수 없다. 시효소멸에도 불구하고 보증채무를 이행하겠다는 약정을 해야 한다.’),
Q(317,14,‘주채무자와 채권자 간의 소멸시효 기간 연장합의는 보증채무에도 효력이 미친다.’,false,‘주채무자와 채권자 간의 소멸시효 기간 연장합의는 무효이며 보증채무에 효력이 미치지 않는다.’),
Q(318,14,‘확정판결로 주채무의 소멸시효기간이 10년으로 연장된 경우 보증채무의 소멸시효기간도 10년으로 연장된다.’,false,‘보증채무의 소멸시효기간은 10년으로 연장되지 않는다.’),
Q(319,14,‘주채무자의 재산에 대한 가압류에 의한 시효중단 효력은 보증인에게 통지하지 않아도 보증채무의 시효도 중단된다.’,true,’’),
Q(320,14,‘보증채무의 시효중단의 효력은 주채무에도 영향을 미친다.’,false,‘보증채무의 시효중단의 효력은 주채무에 영향이 없다.’),
Q(321,14,‘주채무자의 소멸시효이익 포기의 효과는 보증인에게 영향을 미친다.’,false,‘보증인에게 영향을 미치지 않는다.’),
Q(322,14,‘주채무에 대한 소멸시효가 완성된 경우 보증채무에 대한 소멸시효가 중단되더라도 보증채무는 당연히 소멸한다.’,true,’’),
Q(323,14,‘보증인은 주채무자의 채권에 의한 상계로 채권자에게 대항할 수 있다.’,true,’’),
Q(324,14,‘주채권과 분리하여 보증채권만 양도하기로 하는 약정은 유효하다.’,false,‘무효이다.’),
Q(325,14,‘보증한도액을 정한 근보증에서 보증한도액은 이자, 위약금 기타 주채무에 종속한 채무를 모두 포함한다.’,true,’’),
Q(326,14,‘지급보증서상의 보증금액 한도액에 보증채무 자체의 이행지체로 인한 지연손해금이 포함된다.’,false,‘포함되지 않는다.’),
Q(327,14,‘채권자가 주채무자에 대하여 변제기를 연장하여 준 경우 보증채무에 대하여도 그 효력이 미친다.’,true,’’),
Q(328,14,‘수탁보증인의 사전구상권 범위에 면책비용에 대한 법정이자가 포함된다.’,false,‘포함되지 않는다.’),
Q(329,14,‘수탁보증인의 사전구상권 범위에 원금과 사전구상에 응할 당시까지의 이자·지연손해금이 포함된다.’,true,’’),
Q(330,14,‘주채무자가 면책행위를 하고도 수탁보증인에게 통지하지 않은 동안에 수탁보증인이 사전통지 없이 이중의 면책행위를 한 경우 보증인은 주채무자에게 구상할 수 있다.’,false,‘채무소멸의 일반원칙에 따라 선 변제만이 유효하므로 보증인은 주채무자에게 구상할 수 없다.’),
Q(331,14,‘연대보증에서는 최고·검색의 항변권이 없다.’,true,’’),
Q(332,14,‘주채무자의 항변포기는 보증인에게 효력이 미친다.’,false,‘주채무자의 항변포기는 보증인에게 효력이 없다.’),
Q(333,14,‘수인의 연대보증인은 자신의 내부부담부분을 넘은 변제이어야 구상권을 행사할 수 있다.’,true,’’),
Q(334,14,‘채권자의 연대보증인 1인에 대한 채권포기의 효력은 주채무자나 다른 연대보증인에게도 효력이 있다.’,false,‘주채무자나 다른 연대보증인에게는 효력이 없다.’),
Q(335,14,‘연대보증인의 구상권 범위에는 연대채무 규정이 준용되므로 면책된 날 이후의 법정이자가 포함된다.’,true,’’),
Q(336,14,‘연대보증인의 변제기 전 변제 시 변제기 도래 전에도 사후구상권을 행사할 수 있다.’,false,‘변제기 도래 전 사후구상권을 행사할 수는 없다.’),
Q(337,15,‘채권양도금지특약은 선의의 채권양수인에게 대항할 수 없다.’,true,’’),
Q(338,15,‘채권양도금지특약에 반하여 채권양도가 이루어진 경우 양수인의 악의 또는 중과실에 관한 입증책임은 채권자(양도인)가 부담한다.’,false,‘채무자가 부담한다.’),
Q(339,15,‘양도금지특약 있는 채권의 양수인의 선의·무중과실은 추정된다.’,true,’’),
Q(340,15,‘악의의 양수인으로부터 다시 선의로 양수한 전득자는 채권을 유효하게 취득한다.’,true,‘엄폐물의 법칙에 의해 전득자는 보호된다.’),
Q(341,15,‘선의의 양수인으로부터 다시 양수한 자는 악의인 경우 채권을 유효하게 취득할 수 없다.’,false,‘선의의 양수인으로부터 다시 양수한 자는 선의·악의를 불문하고 채권을 유효하게 취득한다.’),
Q(342,15,‘양도금지특약에 위반하여 양도한 후 채무자가 승낙을 한 때에는 소급하여 양도의 효과가 발생한다.’,false,‘승낙시부터 양도의 효과가 발생하며 소급하지 않는다.’),
Q(343,15,‘양도금지특약부 채권에 대한 전부명령은 집행채권자의 선·악을 불문하고 유효하다.’,true,’’),
Q(344,15,‘채무자에 대한 채권양도 대항요건은 통지나 승낙이다.’,true,’’),
Q(345,15,‘제3자에 대한 채권양도 대항요건은 확정일자 있는 증서에 의한 통지나 승낙이다.’,true,’’),
Q(346,15,‘전부명령은 확정일자 있는 증서에 준한다.’,true,’’),
Q(347,15,‘주채권의 양도에 대한 대항요건을 갖춘 경우 보증채권에 대하여도 별도의 대항요건을 구비하여야 한다.’,false,‘보증채권에 대하여 대항요건은 필요 없다.’),
Q(348,15,‘채무자에 의한 승낙의 상대방은 양도인에 한정된다.’,false,‘양도인 또는 양수인이다.’),
Q(349,15,‘채권이 이중으로 양도된 경우 양수인 상호간의 우열은 확정일자의 선후에 의해 결정된다.’,false,‘확정일자 있는 양도통지가 채무자에게 도달한 일시의 선후에 의해 결정된다.’),
Q(350,15,‘채권양도 통지, 가압류 또는 압류명령 등이 제3채무자에게 동시에 송달된 경우 모두 제3채무자에 대하여 완전한 대항력을 가진다.’,true,’’),
Q(351,15,‘채권양도의 대항요건을 갖춘 후 그 채권에 대한 압류 또는 가압류명령 정본이 채무자에게 송달된 경우 그 압류 또는 가압류는 무효이다.’,true,’’),
Q(352,15,‘매매계약에 기한 소유권이전등기청구권의 양도는 통지만으로 대항력을 갖출 수 있다.’,false,‘반드시 채무자의 동의나 승낙이 필요하다.’),
Q(353,15,‘취득시효에 기한 소유권이전등기청구권의 양도에는 채무자의 동의나 승낙이 필요하다.’,false,‘취득시효에 기한 경우 동의·승낙이 불필요하다.’),
Q(354,15,‘채권가압류결정이 제3채무자에게 송달된 이후에는 가압류채무자는 제3채무자에게 이행청구의 소를 제기할 수 없다.’,false,‘가압류는 현실로 급부를 추심하는 것만을 금지할 뿐이므로 이행청구의 소는 가능하다.’),
Q(355,15,‘임대차보증금 반환채권을 양도 통지·승낙 이후에도 연체차임 등을 임대차보증금에서 당연공제할 수 있다.’,true,’’),
Q(356,15,‘임대차보증금반환채권의 양도 통지 후 임대차기간 연장에 관한 합의는 양수인에게 효력을 미치지 않는다.’,true,’’),
Q(357,15,‘지명채권 양도계약이 해제된 경우 채권이 양도인에게 복귀되므로 양수인이 해제사실을 통지하여야 한다.’,true,’’),
Q(358,15,‘채권양도가 다른 채무의 담보조로 이루어진 경우 양도채권의 채무자는 피담보채무가 변제로 소멸되었다는 이유로 채권양수인의 양수금 청구를 거절할 수 있다.’,false,‘거절할 수 없다.’),
Q(359,15,‘채무변제와 관련하여 다른 채권을 양도하는 경우 변제에 갈음한 것으로 추정한다.’,false,‘변제를 위한 담보 또는 변제의 방법으로 양도되는 것으로 추정한다.’),
Q(360,15,‘채권의 양수인이 채권양도의 대항요건을 갖추지 못한 상태에서 채무자를 상대로 재판상의 청구를 한 경우 소멸시효 중단사유인 재판상 청구에 해당한다.’,true,’’),
Q(361,15,‘확정일자 있는 채권양도 통지와 채권가압류결정 정본이 같은 날 도달되었는데 선후 관계에 대한 입증이 없는 경우 동시에 도달된 것으로 추정된다.’,true,’’),
Q(362,15,‘채권양수인의 승계참가신청 시 소송 중 승계인지 판단기준은 양도합의시이다.’,false,‘대항요건 구비시이다.’),
Q(363,15,‘병존적 채무인수에서 채권자의 수익의 의사표시는 성립요건이다.’,false,‘성립요건도, 효력발생요건도 아니고 채권취득요건이다.’),
Q(364,16,‘채무자와 제3자 사이의 계약에 의한 면책적 채무인수는 채권자의 승낙이 없는 경우 이행인수로서의 효력이 있다.’,true,’’),
Q(365,16,‘채권자가 면책적 채무인수의 승낙을 거절한 후 다시 번복하여 승낙하면 채무인수의 효력이 발생한다.’,false,‘거절 후 다시 승낙해도 채무인수의 효력이 발생하지 않는다.’),
Q(366,16,‘인수인은 전채무자의 항변할 수 있는 사유로 채권자에게 대항할 수 있다.’,true,’’),
Q(367,16,‘면책적 채무인수는 소멸시효 중단의 효력이 있다.’,true,’’),
Q(368,16,‘면책적 채무인수 시 원칙적으로 보증이나 제3자가 제공한 담보권은 소멸한다.’,true,’’),
Q(369,16,‘면책적 채무인수에 물상보증인이 동의하여 저당권변경 부기등기가 된 경우 면책적 채무인수 이전의 후순위 저당권자에게 종전 저당권의 효력을 주장할 수 있다.’,true,’’),
Q(370,16,‘임대차보증금 반환채무의 면책적 인수에 대한 임차인의 승낙은 반드시 명시적이어야 한다.’,false,‘묵시적 승낙의 의사표시도 가능하다.’),
Q(371,16,‘채무자와 인수인 사이의 면책적 채무인수의 경우 채무자가 제공한 물적 담보는 소멸한다.’,false,‘채무자가 제공한 물적 담보는 존속한다.’),
Q(372,16,‘중첩적 채무인수에서 채권자의 수익의 의사표시는 채무인수의 효력발생요건이다.’,false,‘성립요건도, 효력발생요건도 아니고 채권취득요건이다.’),
Q(373,16,‘인수인과 채권자 사이의 중첩적 채무인수는 채무자의 의사에 반하여도 가능하다.’,true,’’),
Q(374,16,‘중첩적 채무인수인과 채무자의 관계에서 채무자의 부탁이 없으면 부진정연대채무이다.’,true,’’),
Q(375,16,‘중첩적 채무인수에서 채무자에 대한 담보권은 소멸한다.’,false,‘채무자에 대한 담보권은 존속한다.’),
Q(376,16,‘중첩적 채무인수인의 상계의 절대효가 인정된다.’,true,’’),
Q(377,16,‘보증인이 중첩적 채무인수를 한 경우 종전 보증인 지위는 소멸한다.’,false,‘종전 보증인 지위 그대로 유지된다.’),
Q(378,16,‘이행인수인은 채권자에 대하여 직접적 이행의무를 부담한다.’,false,‘이행인수인은 채권자에 대하여 직접적 이행의무를 부담하지 않는다.’),
Q(379,16,‘이행인수인은 변제할 정당한 이익이 있는 자에 해당하여 법정대위를 할 수 있다.’,true,’’),
Q(380,16,‘이행인수인이 채권자에 대하여 채무자의 채무를 승인하더라도 특별한 사정이 없는 한 시효중단의 효력이 발생하지 않는다.’,true,’’),
Q(381,16,‘상법상 영업양도에 수반된 계약인수의 경우에도 개별 채권양도 대항요건을 별도로 구비하여야 한다.’,false,‘개별 채권양도 대항요건 별도 요구가 없다.’),
Q(382,16,‘양도인의 제3채무자에 대한 채권이 압류된 후 계약인수가 이루어진 경우 인수인은 압류에 의하여 권리가 제한된 상태의 채권을 이전받는다.’,true,’’),
Q(383,12,‘사해행위로 부동산 소유권이 이전된 후 제3자가 저당권이나 지상권 등의 권리를 취득한 경우, 채권자는 수익자를 상대로 사해행위취소 및 채무자에 대한 소유권이전등기절차의 이행을 청구할 수 있다.’,true,’’),
Q(384,12,‘법원이 원상회복으로 가액배상을 명하는 경우 청구취지의 변경 없이 곧바로 가액배상을 명할 수 있으며, 이것이 처분권주의에 반하는 것도 아니다.’,true,’’),
Q(385,12,‘전득자에 대하여 별도로 채권자취소권을 행사하려면 민법 제406조 제2항에서 정한 기간 안에 채무자와 수익자 사이의 사해행위를 취소하는 소를 제기해야 한다.’,true,’’),
Q(386,12,‘사해행위 취소 전에 수익자가 먼저 배당금을 지급받은 경우 채권자는 그 금원 중 채권액 상당의 가액배상을 청구할 수 있다.’,true,’’),
Q(387,12,‘가등기에 기한 본등기가 경료된 경우 원칙적으로 본등기의 원인인 법률행위 당시를 기준으로 사해행위 요건의 구비 여부를 판단한다.’,false,‘원칙적으로 가등기의 원인인 법률행위 당시를 기준으로 판단한다.’),
Q(388,12,‘채권자대위권행사 통지 후에 채무자의 채무불이행을 이유로 통지 전 체결된 약정에 따라 매매계약이 자동 해제된 경우, 제3채무자는 계약해제로써 채권자에게 대항할 수 있다.’,true,’’),
Q(389,12,‘채권자대위소송에서 피보전채권의 존재 여부는 법원의 직권조사사항이다.’,true,’’),
Q(390,12,‘사해행위 당시 아직 성립되지 않은 채권도, 사해행위 당시 채권 성립의 기초가 되는 법률관계가 발생되어 있고 가까운 장래에 채권이 성립되리라는 고도의 개연성이 있으며 실제로 그 개연성이 현실화되어 채권이 성립된 경우 피보전채권이 될 수 있다.’,true,’’),
Q(391,12,‘무자력상태의 채무자가 자백으로 패소확정판결을 받아 수익자 앞으로 소유권이전등기가 마쳐진 경우, 일련의 행위의 실질적인 원인이 되는 채무자와 수익자 사이의 이전합의는 사해행위에 해당한다.’,true,’’),
Q(392,12,‘수익자의 채권자로서 이미 가지고 있던 채권 확보를 위하여 부동산을 압류한 자에게는 사해행위취소판결의 효력이 미친다.’,false,‘수익자의 채권자로서 이미 가지고 있던 채권 확보를 위하여 부동산을 압류한 자에게는 사해행위취소판결의 효력이 미치지 않는다.’),
Q(393,12,‘소송의 당사자가 아닌 다른 채권자가 채무자를 대위하여 말소등기를 마쳤더라도 그 등기가 실체관계에 부합한다면 유효하다.’,true,’’),
Q(394,13,‘채권자가 연대채무자 중 1인의 소유 부동산에 경매신청을 하고 그로부터 6개월 내에 다른 연대채무자를 상대로 재판상 청구한 경우, 경매신청 시로부터 그 다른 연대채무자에 대한 채권의 소멸시효가 중단된다.’,true,’’),
Q(395,13,‘수인이 공동하여 물건을 차용한 때에는 연대하여 그 의무를 부담한다(민법 제616조).’,true,’’),
Q(396,13,‘연대채무는 자신의 출재로 공동면책이 된 때에 다른 연대채무자의 부담부분에 대하여 구상권을 행사할 수 있으나, 보증채무의 경우 자신의 부담부분 이상을 출재하여야 구상권을 행사할 수 있다.’,true,’’),
Q(397,13,‘연대채무에 있어서 소멸시효의 절대효는 공동불법행위자 상호간의 부진정연대채무에 대하여도 적용된다.’,false,‘적용되지 않는다.’),
Q(398,13,‘불가분채권자 중 1인과 채무자간에 경개나 면제가 있는 경우, 채무 전부의 이행을 받은 다른 채권자는 그 1인이 권리를 잃지 아니하였으면 그에게 분급할 이익을 채무자에게 상환하여야 한다.’,true,’’),
Q(399,13,‘연대채무자 중 무자력자가 있는 경우, 채권자가 연대의 면제를 한 채무자가 존재하더라도 채권자는 그 면제받은 채무자의 부담부분을 추가로 부담하지 않는다.’,false,‘연대의 면제를 받은 채무자의 부담부분은 채권자가 부담한다.’),
Q(400,13,‘부진정연대채무자들 중 1인이 전체 채무를 변제한 경우, 나머지 부진정연대채무자들이 부담하는 구상채무는 원칙적으로 분할채무이나, 구상권자에게 내부적 부담 부분이 없는 경우 부진정연대채무이다.’,true,’’),
Q(401,13,‘연대보증인이 구상권을 어느 보증인에게 청구하기 위해서는 자신의 부담부분을 넘은 변제를 하여야 하고, 이미 자신의 부담부분에 대한 이행의무를 다한 보증인이 아닌 자에 대하여만 청구할 수 있다.’,true,’’),
Q(402,13,‘불가분채무관계에 있던 공동매도인이 계약이 무효로 됨에 따라 지게 되는 부당이득반환의무는 불가분채무이다.’,true,’’),
Q(403,14,‘주채무 소멸시효기간이 10년으로 연장된 상태에서 보증한 경우, 보증채무 소멸시효기간은 보증채무의 성질에 따라 결정된다.’,true,’’),
Q(404,14,‘다른 사람이 발행하는 약속어음에 명시적으로 어음보증을 하는 사람은 그 어음보증으로 인한 어음상의 채무만을 부담한다.’,true,’’),
Q(405,14,‘어느 공동불법행위자를 위하여 보증인이 된 자가 손해배상채무를 변제한 경우, 그 보증인은 다른 공동불법행위자에 대하여 그 부담부분에 한하여 구상권 내지 부당이득반환청구를 행사할 수 있으며, 신원보증의 경우에도 마찬가지이다.’,true,’’),
Q(406,14,‘계속적 채권관계에서 발생하는 주계약상의 불확정 채무에 대해 보증한 경우, 주계약상 거래기간이 연장되지 않은 경우에는 보증계약 종료 시에 보증채무가 확정된다.’,true,’’),
Q(407,14,‘부동산의 제3취득자는 필요비를 지출한 경우 경매 매각대금에서 우선상환을 받을 수 있다.’,true,’’),
Q(408,14,‘물상보증인으로부터의 제3취득자인 경우 저당권 실행으로 소유권을 잃는다면 원칙적으로 채무자에게 구상권을 행사할 수 있다.’,true,’’),
Q(409,14,‘보증채무의 지연손해금은 보증한도액과는 별도로, 특별한 약정이 없으면 거래행위의 성질에 따른 법정이율에 의한다.’,true,’’),
Q(410,14,‘주채무자의 보증인에 대한 구상금채무를 연대보증한 자는 특별한 사정이 없는 한 주채무자와 같은 내용의 채무를 부담한다.’,true,’’),
Q(411,14,‘주채무와 별도로 보증채무에 대한 위약금계약을 체결할 수 있다.’,true,’’),
Q(412,14,‘취소할 수 있는 채무를 보증한 보증인의 책임에 관한 민법 제436조는 현행 민법에 여전히 존재한다.’,false,‘민법 제436조는 삭제되었다.’),
Q(413,14,‘보증인이 주채무자에게 통지 없이 자기의 출재로 주채무를 소멸시킨 경우, 대항사유가 상계인 때에는 상계로 소멸할 채권이 보증인에게 이전된다.’,true,’’),
Q(414,14,‘수인의 연대보증인이 존재하는 상황에서 주채무자가 일부를 변제한 경우, 연대보증인은 주채무자의 변제액수를 제외한 나머지 부분에 대하여 내부부담부분을 넘은 변제를 하여야 구상권을 행사할 수 있다.’,true,’’),
Q(415,14,‘도급인이 구체적으로 지휘 감독권을 보유한 경우 사용자책임이 인정되지만, 단순히 공사가 설계대로 시행되는가를 확인하는 감리에 불과한 경우 사용자책임이 인정되지 않는다.’,true,’’),
Q(416,14,‘공작물 소유자의 책임은 무과실책임이다.’,true,’’),
Q(417,14,‘변제할 정당한 이익이 있는 자의 변제는 채권자의 동의 없이도 채권자를 법정대위한다.’,true,’’),
Q(418,14,‘채권의 추심을 위임하여 채권을 양도하였으나 양도의 원인이 되는 위임이 해지로 효력이 소멸하여 채권이 양도인에게 복귀한 경우, 양수인은 원상회복의무로 채무자에게 통지할 의무를 부담한다.’,true,’’),
Q(419,15,‘저당권과 피담보채권을 함께 양수하였으나 부기이전등기만 하고 채권양도 대항요건을 갖추지 않은 경우에도 경매신청이 가능하며, 경매개시결정에서 채권양도의 대항요건 구비 증명은 불요하다.’,true,’’),
Q(420,15,‘매도인이 매수인에 대한 매매대금채권을 양수인에게 양도한 데 매수인이 이의 유보 없는 승낙을 하였더라도, 양수인이 악의 또는 중과실에 해당하는 한 매수인은 매도인의 소유권이전등기의무 이행제공 없음을 이유로 양수인에게 대항할 수 있다.’,true,’’),
Q(421,15,‘제2차 양도계약 후 제1차 양도계약이 합의해지됨으로써 채권이 다시 양도인에게 귀속하게 되었더라도, 양도인이 처분권한 없이 한 제2차 양도계약이 채권양도로서 유효하게 된다.’,false,‘제1차 양도계약의 해지로 제2양수인이 당연히 채권을 취득하게 되지 않는다.’),
Q(422,15,‘확정일자 있는 채권양도통지와 (가)압류결정의 우열은 채무자에 도달한 선후로 결정된다.’,true,’’),
Q(423,15,‘채권가압류결정이 송달된 이후 가압류채권의 양도도 가능하지만, 가압류채권자가 본안 승소하여 집행권원을 취득하면 채권양도는 무효가 된다.’,true,’’),
Q(424,15,‘양도금지특약이 있는 채권을 전부받은 자로부터 다시 그 채권을 양수한 자가 양도금지특약에 대하여 악의인 경우, 채무자는 위 특약을 근거로 채권양도의 무효를 주장할 수 없다.’,true,’’),
Q(425,15,‘확정일자에 기한 제1채권양도가 합의해지 되더라도, 제1양도 이후에 이루어진 제2양수인에 대한 채권양도는 유효로 되지 않는다.’,true,‘처분권한 없는 자에 의한 처분행위에 해당하여 무효이다.’),
Q(426,15,‘불법행위에서 위법행위 시점과 손해발생 시점 사이에 시간적 간격이 있는 경우, 불법행위로 인한 손해배상청구권의 지연손해금 발생 기산일은 위법행위 시점이다.’,false,‘손해발생 시점이다.’),
Q(427,15,‘법률의 변경은 변론종결 이후의 변경된 사실관계에 해당하지 아니하여 차단효가 있으므로, 승소확정 이후 후소에서 선판결과 상이한 소속법상 이율을 적용할 수 없다.’,true,’’),
Q(428,15,‘전세기간 만료 이후 전세권양도계약 및 전세권이전의 부기등기가 이루어진 것은 전세금반환채권의 양도에 관하여 확정일자 있는 통지나 승낙이 있었다고 볼 수 없다.’,true,’’),
Q(429,15,‘근저당권부 채권이 양도되었으나 근저당권이전등기가 경료되지 않은 상태에서 배당절차가 실시된 경우, 근저당권의 명의인이 배당이의로 배당표의 경정을 구할 수 없다.’,true,’’),
Q(430,15,‘민법 제450조 제2항의 대항요건은 양도된 채권이 이미 변제 등으로 소멸한 경우에도 적용된다.’,false,‘양도된 채권이 이미 변제 등으로 소멸한 경우에는 문제가 안 된다.’),
Q(431,15,‘선순위근저당권부채권을 양도하였으나 아직 대항요건을 갖추지 못한 경우, 후순위근저당권자는 대항요건 흠결을 이유로 그 채권양도의 효력을 부인할 수 없다.’,true,’’),
Q(432,15,‘채권양도통지서가 배달된 장소가 민사소송법상 적법한 송달장소가 아니더라도, 채무자가 사회통념상 그 통지의 내용을 알 수 있는 객관적 상태에 놓여졌다고 인정되면 유효한 통지이다.’,true,’’),
Q(433,15,‘이의를 보류하지 아니한 채권양도 승낙의 법적 성격은 관념의 통지이며, 대리인에 의하여도 승낙이 가능하다.’,true,’’),
Q(434,15,‘채권양도 통지만으로는 제척기간 준수에 필요한 권리의 재판외 행사에 해당한다.’,false,‘채권양도 통지만으로는 제척기간 준수에 필요한 권리의 재판외 행사에 해당하지 않는다.’),
Q(435,15,‘주임법상 대항력을 취득한 임차인이 있는 상태에서 주택이 매도된 경우, 양도인은 임대차관계에서 탈퇴하고 양수인이 면책적으로 임대인의 지위를 인수한다.’,true,’’),
Q(436,15,‘채권양수인이 양도되는 채권의 채무자인 경우 채권은 혼동으로 소멸하며, 이후 같은 채권에 대한 가압류결정은 무효이다.’,true,’’),
Q(437,16,‘매매대금에서 임대차보증금반환채무를 공제하기로 약정한 경우, 채권자에게 직접 채권을 취득케 할 의사임을 인정할 수 있는 특별한 사정이 없는 한 원칙적으로 이행인수로 본다.’,true,’’),
Q(438,16,‘면책적 채무인수에서 채무자인 매도인이나 제3자인 매수인은 임차인에게 임대차보증금 반환채무에 대한 면책에 관한 승낙 여부의 확답을 최고할 수 있고, 임차인이 상당한 기간 내에 확답을 발송하지 않은 경우에는 거절한 것으로 본다.’,true,’’),
Q(439,16,‘이행인수에서 채무자는 이행인수인에 대하여 채권자에게 이행을 요구할 수 있는 권리가 있다.’,true,’’),
Q(440,16,‘매수인이 매매목적물에 관한 근저당권의 피담보채무액을 매매대금에서 공제하기로 약정한 경우, 매수인이 근저당채무의 이자를 지급하지 않는다는 이유로 계약을 해제할 수 없다.’,true,’’),
Q(441,16,‘매수인이 임의경매절차가 개시되도록 변제를 하지 않아 매도인이 이를 변제하여 구상권을 취득하게 된 경우, 매수인의 구상채무이행의무와 매도인의 소유권이전의무는 동시이행관계에 선다.’,true,’’),
Q(442,16,‘이행인수인은 채권자에게 직접 청구할 수 없지만 채무자의 권리를 대위하여 행사할 수 있다.’,true,’’),
Q(443,3,‘약정이율이 법정이율보다 높은 경우, 지연손해금 약정이 없더라도 약정이율에 의한 지연손해금 청구가 가능하다.’,true,’’),
Q(444,3,‘지정변제충당에서 1차 지정권자는 채무자이고 2차 지정권자는 변제수령자이다.’,true,’’),
Q(445,3,‘이자약정이 없는 약속어음채무는 이자약정이 있는 금전채무보다 변제이익이 작다.’,true,’’),
Q(446,3,‘주채무자가 아닌 제3자가 변제자인 경우, 변제자가 발행·배서한 어음으로 담보되는 채무가 다른 채무보다 변제이익이 크다.’,true,’’),
Q(447,4,‘채권자가 부동산에 대하여 저당권을 가지고 있는 경우, 일부 대위변제가 있으면 채권자는 대위변제자에게 저당권의 일부이전에 관한 부기등기를 하여줄 의무가 있다.’,true,’’),
Q(448,4,‘일부대위의 경우 민법 제483조의 '함께 권리를 행사한다'는 의미는 변제자는 채권자가 담보권을 행사하는 경우에만 권리 행사가 가능하다는 것이다.’,true,’’),
Q(449,4,‘보증인과 물상보증인의 지위를 겸하는 자는 대위비율 산정 시 2인으로 본다.’,false,‘1인으로 본다.’),
Q(450,5,‘변제할 정당한 이익이 있는 자란 변제를 하지 않으면 채권자로부터 집행을 받게 되거나 채무자에 대한 자기의 권리를 잃게 되는 지위에 있어 변제함으로써 당연히 대위의 보호를 받아야 할 법률상 이익을 가지는 자이다.’,true,’’),
Q(451,6,‘채권양도통지와 가압류명령이 동시도달 후 제3채무자가 변제공탁을 한 경우, 도달시점 이후 채권압류 및 추심명령을 받은 다른 채권자가 배당요구하면 채권양수인과 선행 가압류채권자 사이에서만 채권액에 안분하여 배당한다.’,true,’’),
Q(452,7,‘불법행위로 인한 손해배상채무의 지연손해금은 원칙적으로 불법행위와 동시에 발생하지만, 불법행위시와 변론종결시 사이에 장기간이 경과하여 위자료의 현저한 증액이 불가피한 경우 예외적으로 사실심 변론종결 당일부터 발생한다.’,true,’’),
Q(453,7,‘채무자가 어음의 반환이 없음을 이유로 원인채무의 변제를 거절할 수 있다 하여도, 채권자가 어음의 반환을 제공하지 않으면 원인채무에 대한 적법한 이행의 최고를 할 수 없다.’,false,‘채권자는 어음 반환 제공 없이도 적법한 이행의 최고를 할 수 있으며, 채무자는 이행기 도과 시 원칙적으로 지체책임을 진다.’),
Q(454,7,‘지정업종에 관한 경업금지의무는 분양자에게도 적용된다.’,true,’’),
Q(455,7,‘국유화 등으로 수용보상금을 청구할 수 있는 방법이나 절차가 없다가 상당한 기간이 지난 뒤에야 마련된 경우, 그 방법이 마련된 시점부터 대상청구권의 소멸시효가 진행된다.’,true,’’),
Q(456,8,‘토지에 대한 부당한 가압류 집행으로 그 지상에 건물신축공사 도급계약이 해제됨으로 인한 손해는 특별손해이다.’,true,’’),
Q(457,8,‘수급인이 제공한 하자 있는 목적물로 인한 도급인의 정신적 고통은 특별손해에 해당한다.’,true,’’),
Q(458,8,‘통상손해와 특별손해의 구별기준은 사회통념에 따른다.’,true,’’),
Q(459,8,‘동시이행관계에 있는 쌍방의 채무에서 이행기가 되었다 하더라도 상대방이 이행의 제공을 할 때까지는 지체책임을 지지 않는다.’,true,’’),
Q(460,8,‘채무불이행에 의한 계약 해제는 상대방의 고의나 과실이 있어야 하며, 이는 특별한 사정이 없는 한 다른 약정이 있다 하여도 배제할 수 없다.’,true,’’),
Q(461,9,‘손해배상액의 예정을 한 경우, 실제로 손해발생이 없다거나 손해액이 예정보다 적다는 것을 입증하여 예정액의 지급을 면하거나 감액을 청구할 수 없다.’,true,’’),
Q(462,9,‘채권자가 채권의 목적 전부를 손해배상 받은 경우 채무자는 당연히 채권자를 대위한다.’,true,’’),
Q(463,9,‘예탁금계약에 기한 정기예탁금 반환청구 사건에서 예금주의 인장관리 소홀을 이유로 과실상계를 적용할 수 있다.’,false,‘채무내용에 따른 본래 급부의 이행을 구하는 경우에는 과실상계가 적용되지 않는다.’),
Q(464,10,‘상계의 수동채권은 상대방이 상계자에 대하여 가지는 채권이어야 하며, 상대방이 제3자에 대하여 가지는 채권을 수동채권으로 하는 상계는 금지된다.’,true,’’),
Q(465,10,‘소송상 상계항변에서 동시이행항변에 제공된 채권에 대한 상계항변은 기판력이 발생하지 않는다.’,true,’’),
Q(466,10,‘사용자가 초과 지급된 임금의 부당이득반환청구권으로 근로자의 임금채권과 상계할 수 있는 경우에도, 이러한 상계는 임금채권의 2분의 1을 초과하는 부분에 관하여만 허용된다.’,true,’’),
Q(467,10,‘임대인이 임차인에 대해 갖고 있던 대여금채권의 소멸시효가 임대차 존속 중 완성된 경우, 임대인은 그 대여금채권을 자동채권으로 하여 임차인의 유익비상환채권과 상계할 수 없다.’,true,’’),
Q(468,10,‘고의의 불법행위로 인한 손해배상채권의 양도가 사해행위에 해당하는 경우, 그 손해배상채권의 채무자는 채권자취소권을 행사하여 채권양도의 취소를 구함과 아울러 원상회복 방법으로 직접 자신 앞으로 가액배상의 지급을 구할 수 있다.’,true,’’),
Q(469,10,‘확정일자부 채권양도통지가 이루어진 후 그 채권이 압류되고 채권양도가 사해행위임을 이유로 취소된 경우, 무효인 압류가 유효로 된다.’,false,‘무효인 압류가 유효로 되지 않는다.’),
Q(470,11,‘채무자의 부동산에 이미 제3자 앞으로 담보가등기가 경료된 경우, 강제집행으로 매각이 가능하다는 등 특별한 사정이 없는 한 채무자의 적극재산으로 산정하지 않는다.’,true,’’),
Q(471,11,‘채권자대위소송에서 제3채무자는 피보전채권의 발생원인이 무효라거나 변제로 소멸한 사실을 주장할 수 있다.’,true,’’),
Q(472,11,‘채권자의 채무자에 대한 피보전채권 이행소송 승소확정 후, 채무자를 대신하여 소송행위하는 것을 주목적으로 하였다면 채권자대위소송에서 제3채무자는 피보전채권의 존재를 다툴 수 있다.’,true,’’),
Q(473,11,‘금전채권에 대한 채권자대위소송에서 채권자에게 직접 지급하도록 한 판결이 확정되면, 피대위채권 소멸 전에도 다른 채권자의 그 피대위채권에 대한 압류나 가압류가 가능하다.’,true,’’),
Q(474,11,‘비법인사단인 채무자가 사원총회 결의 없이 총유재산에 관한 소를 제기하여 각하판결이 확정된 경우, 채무자가 스스로 제3채무자에 대한 권리를 재판상 행사한 것으로 본다.’,false,‘채무자가 스스로 제3채무자에 대한 권리를 재판상 행사한 것으로 볼 수 없다.’),
Q(475,11,‘채권자가 채무자를 대위하여 제3채무자에게 한 처분금지가처분은 제3채무자가 채무자에게 이행하는 것을 금지하는 효력이 없다.’,true,’’),
Q(476,11,‘채권자대위권행사 사실을 알게 된 후 채무자의 다른 채권자의 압류명령은 유효하지만 전부명령은 무효이며, 이로 인해 채권자대위소송이 기각되지 않는다.’,true,’’),
Q(477,11,‘채권자대위소송에서 제3채무자는 채권자의 채무자에 대한 채권이 시효로 소멸하였음을 주장하여 채권자에게 대항할 수 없다.’,true,‘시효소멸 주장은 채무자의 채권자에 대한 항변이므로 제3채무자는 주장할 수 없다.’),
Q(478,11,‘시효취득한 부동산의 상속인이 자신의 지분을 초과한 부분에 대하여는 채권자대위권을 행사할 수 없다.’,true,‘보전의 필요성이 없다.’),
Q(479,11,‘채권자대위권에 기한 청구에서 피대위채권 자체를 양수하여 양수금청구로 소를 변경한 경우, 당초의 채권자대위소송에 의한 시효중단의 효력은 소멸하지 않는다.’,true,’’),
Q(480,11,‘채권자대위권의 목적이 될 수 있는 권리에는 본안제소명령의 신청권이나 가압류·가처분의 취소신청권이 포함되지만, 재심의 소 제기는 포함되지 않는다.’,true,’’),
Q(481,11,‘채무자의 부동산을 시효취득한 채권자의 공동상속인이 채무자에 대한 소유권이전등기청구권을 피보전채권으로 하여 대위행사하는 경우, 공동상속인은 자신의 지분 범위 내에서만 대위행사할 수 있다.’,true,’’),
Q(482,11,‘채권자대위소송의 당사자적격 요건인 피보전채권의 존재, 보전필요성의 존재, 채무자의 권리 불행사 중 어느 하나가 흠결되면 소를 각하한다.’,true,’’),
Q(483,11,‘채권자대위권의 피보전채권은 그 발생원인과 제3채무자에 대한 대항 여부를 불문한다.’,true,’’),
Q(484,11,‘채권자대위소송에서 제3채무자로 하여금 직접 대위채권자에게 금전의 지급을 명하는 판결이 확정된 경우, 피대위채권이 변제 등으로 소멸하기 전이면 채무자의 다른 채권자는 압류·가압류가 가능하다.’,true,’’),
Q(485,12,‘사해행위취소 및 원상회복을 명하는 판결이 확정된 후 재산 회복 전 피보전채권이 소멸된 경우, 청구이의의 소로 집행력을 배제할 수 있다.’,true,’’),
Q(486,12,‘사해행위 수익자나 전득자에 대하여 회생절차가 개시된 경우, 수익자나 전득자의 관리인을 상대로 사해행위취소 및 원상회복의 소 제기가 가능하다.’,true,’’),
Q(487,12,‘사해행위 목적 부동산 전부가 하나의 계약으로 동일인에게 양도된 경우, 목적 부동산 전체의 가액에서 공동저당권의 피담보채권 총액을 공제한 금액이 가액배상의 기준이 된다.’,true,’’),
Q(488,12,‘사해행위 후 채권을 가지게 된 자는 민법 제407조가 정한 사해행위취소와 원상회복의 효력을 받는 채권자에 포함된다.’,false,‘사해행위 후 채권을 가지게 된 자는 포함되지 않는다.’),
Q(489,12,‘유효한 부부간의 명의신탁약정을 해지함을 전제로 신탁된 부동산을 제3자에게 직접 처분하면서 중간등기를 생략하고 수탁자에게서 곧바로 제3자 앞으로 소유권이전등기를 마쳐 준 신탁자의 법률행위는 사해행위에 해당한다.’,true,’’),
Q(490,12,‘채무자가 유일한 재산인 부동산에 관한 매매예약의 예약완결권이 제척기간 경과가 임박하여 소멸할 예정인 상태에서 제척기간을 연장하기 위하여 새로이 매매예약을 하는 행위는 사해행위에 해당한다.’,true,’’),
Q(491,12,‘매도인이 선의인 부동산 계약명의신탁에서 명의수탁자의 재산이 채무의 전부를 변제하기에 부족한 경우에 수탁자가 위 부동산을 명의신탁자 또는 그가 지정하는 자에게 양도하는 행위는 사해행위에 해당한다.’,true,’’),
Q(492,12,‘이미 근저당권이 설정된 부동산의 매매가 사해행위인지 문제된 경우, 사해행위 당시 부동산의 시가를 근저당권의 피담보채권액이 초과한 경우라면 사해행위에 해당하지 않는다.’,true,’’),
Q(493,12,‘이미 근저당권이 설정된 부동산의 매매가 사해행위인 경우 원물반환이 원칙이지만, 예외적으로 당해 근저당권이 말소된 경우에는 가액반환이 가능하며, 가액반환 산정시는 사실심 변론종결시를 기준으로 한다.’,true,’’),
Q(494,12,‘수익자가 취소채권자에 대한 별개의 채권으로, 취소채권자의 수익자에 대한 가액배상채권을 압류·전부할 수 있다.’,true,’’),
Q(495,12,‘채권자는 원상회복 방법으로 가액배상 대신 수익자 명의의 등기말소를 구하거나, 수익자를 상대로 채무자 앞으로 직접 소유권이전등기절차를 이행할 것을 구할 수 있다.’,true,’’),
Q(496,12,‘사해행위의 목적물인 부동산에 사해행위 이전에 임대차 계약을 체결한 우선변제권 있는 임차인이 있는 경우, 수익자의 가액반환 범위에서 임차보증금에 해당하는 부분을 공제한다.’,true,’’),
Q(497,12,‘사해행위의 목적물인 부동산에 사해행위 이후에 임대차 계약을 체결한 임차인이 있는 경우, 수익자의 가액반환 범위에서 임차보증금에 해당하는 부분을 공제한다.’,false,‘사해행위 이후에 임대차 계약을 체결한 경우에는 임차보증금에 해당하는 부분을 공제하지 않는다.’),
Q(498,12,‘채권자가 전득자를 상대로 사해행위취소의 소를 제기한 경우, 취소의 효과는 채권자와 전득자 사이에서만 무효이다(상대적 무효).’,true,’’),
Q(499,12,‘저당권이 설정된 부동산에 관하여 사해행위가 이루어진 후 변제 등에 의하여 저당권설정등기가 말소된 경우, 부동산 자체의 회복을 명하는 것은 당초 일반 채권자들의 공동담보로 되어 있지 아니하던 부분까지 회복을 명하는 것이 되어 공평에 반한다.’,true,’’),
Q(500,12,‘저당권이 설정된 부동산에 관하여 사해행위가 이루어진 후 저당권설정등기가 말소된 경우, 부동산의 가액에서 저당권의 피담보채무액을 공제한 잔액의 한도에서 사해행위를 취소하고 가액의 배상을 구할 수 있다.’,true,’’),
Q(501,12,‘통정허위표시는 채권자취소권의 대상이 된다.’,true,’’),
Q(502,12,‘사해행위 후 그 목적물에 관해 제3자가 저당권을 취득한 경우, 채권자는 원상회복 방법으로 가액배상 대신 채무자 앞으로 직접 소유권이전등기를 청구할 수 있다.’,true,’’),
Q(503,12,‘채권자의 사해행위 취소소송 시 수익자와 전득자의 행위가 사해행위에 해당하는지는 입증할 필요가 없다.’,true,’’),
Q(504,13,‘건물철거의무를 부담하는 공동상속인들에 대한 건물철거소송의 병합 형태는 통상공동소송이다.’,true,’’),
Q(505,13,‘연대채무자 중 1인이 채무 일부를 면제받아 그 연대채무자가 지급해야 할 잔존채무액이 부담부분을 초과하는 경우, 다른 연대채무자는 채무 전액을 부담한다.’,true,’’),
Q(506,13,‘중첩적(병존적) 채무인수에서 채무자와 인수인은 원칙적으로 연대채무관계이다.’,true,’’),
Q(507,13,‘부진정연대채무에서 채무자 1인에게 손해 전액을 청구할 수 있다.’,true,’’),
Q(508,13,‘부진정연대채무에서 변제, 대물변제, 공탁, 상계는 다른 부진정연대채무자에게 절대적 효력이 있다.’,true,’’),
Q(509,13,‘공동불법행위자 중 1인의 손해배상채무의 시효가 소멸한 후에 다른 불법행위자가 자기부담 부분 이상을 변제하였다면 시효소멸자에 대해서 구상청구를 할 수 있다.’,true,’’),
Q(510,13,‘다수가 타인의 부동산을 점유·사용함에 따라 원소유자에게 부담하는 부당이득반환채무는 불가분채무이다.’,true,’’),
Q(511,14,‘채무부존재확인의 소에 응소한 후 소멸시효가 완성되고 이후 시효중단을 주장한 경우, 응소시에 시효가 중단된다.’,true,’’),
Q(512,14,‘부동산의 제3취득자는 경매인이 될 수 있다.’,true,’’),
Q(513,14,‘부동산의 제3취득자는 변제기가 도래한 채무를 변제하고 저당권소멸청구를 할 수 있다.’,true,’’),
Q(514,15,‘채권의 이중양도 등의 우열을 가릴 수 없는 경우 변제공탁이 가능하다.’,true,’’),
Q(515,15,‘민법 제450조 제2항의 대항요건은 양도된 채권이 존속하는 동안에 그 채권에 관하여 양수인의 지위와 양립할 수 없는 법률상의 지위를 취득한 제3자가 있는 경우에 적용된다.’,true,’’),
Q(516,15,‘지명채권 양도통지의 원칙적 통지권자는 양도인이다.’,true,’’),
Q(517,16,‘표시광고법상 허위·과장광고의 불법행위를 원인으로 한 손해배상청구권을 가지고 있던 아파트 수분양자가 수분양자의 지위를 제3자에게 양도하였다는 사정만으로 양수인이 당연히 위 손해배상청구권을 행사할 수 있다.’,false,‘수분양자의 지위 양도만으로는 양수인이 당연히 손해배상청구권을 행사할 수 없다.’),
Q(518,16,‘매매대금에서 임대차보증금반환채무를 공제하기로 약정하였는데 임대차보증금반환채권자의 승낙이 없다면 면책적 채무인수가 성립하지 않는다.’,true,’’),
Q(519,16,‘매매대금에서 임대차보증금반환채무를 공제하기로 약정한 경우, 채권자에게 직접 채권을 취득케 할 의사임을 인정하려면 공제금에 상당하는 권리관계도 양도하거나 채무부담에 상응하는 대가를 얻는 등의 특별한 사정이 있어야 중첩적 채무인수가 성립한다.’,true,’’),
Q(520,16,‘이행인수는 채무자와 인수인 사이의 계약으로 인수인이 채무자의 채무를 이행할 의무를 지는 것이다.’,true,’’),
Q(521,16,‘매수인이 근저당권의 피담보채무액을 매매대금에서 공제하기로 약정한 경우, 매수인이 그 근저당채무를 인수하여 매매대금의 일부로 갈음하는 것이다.’,true,’’)
];

// ── 유틸
function shuf(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function cp(o){return JSON.parse(JSON.stringify(o))}
function tn(id){return T.find(t=>t.id===id)?.n||’’}
function fq(id){return QQ.find(q=>q.id===id)}

// ── 상태
let st=cp(DS), sess=null, fb=null;

// ── 초기화
async function init(){
// Firebase 기다리지 않고 즉시 렌더링
render();
// 백그라운드에서 Firebase 데이터 로드 후 홈 화면만 갱신
loadSt().then(loaded=>{
  if(!sess){ st=loaded; render(); }
}).catch(()=>{});
// 퀴즈 메타 백그라운드 등록
db.ref('quizzes/'+QUIZ_ID).once('value').then(snap=>{
  if(!snap.exists()) db.ref('quizzes/'+QUIZ_ID).set(QUIZ_META);
}).catch(()=>{});
}

function start(mode,tid=null,bi=null){
let qs=[];
if(mode===‘topic’) qs=shuf(QQ.filter(q=>q.topicId===tid).map(q=>q.id));
else if(mode===‘rand’) qs=shuf(QQ.map(q=>q.id)).slice(0,100);
else qs=shuf([...(st.banks[bi]||[])]);
if(!qs.length) return;
sess={mode,tid,bi,qs,idx:0,cor:[],wr:[]};fb=null;render();
}

function ans(ua){
if(fb) return;
const q=fq(sess.qs[sess.idx]),ok=ua===q.answer;
fb={ok,ua};
if(ok) sess.cor.push(q.id); else sess.wr.push(q.id);
const ns=cp(st);
const qs=ns.qS[q.id]||{c:0,w:0};ns.qS[q.id]={c:qs.c+(ok?1:0),w:qs.w+(ok?0:1)};
const ts=ns.tS[q.topicId]||{c:0,w:0,n:0};ns.tS[q.topicId]={c:ts.c+(ok?1:0),w:ts.w+(ok?0:1),n:ts.n+1};
ns.ov={c:(ns.ov.c||0)+(ok?1:0),w:(ns.ov.w||0)+(ok?0:1),n:(ns.ov.n||0)+1};
st=ns; saveSt(st); render();
}

function nxt(){
fb=null;
const nx=sess.idx+1;
if(nx>=sess.qs.length) fin(); else {sess.idx=nx;render();}
}

function fin(){
const s=sess,ns=cp(st);
if(s.mode===‘review’){
const bi=s.bi,answered=new Set([...s.cor,...s.wr]);
ns.banks[bi]=(ns.banks[bi]||[]).filter(id=>!answered.has(id));
if(bi+1<=4){const nx=new Set(ns.banks[bi+1]||[]);s.wr.forEach(id=>nx.add(id));ns.banks[bi+1]=[...nx];}
} else {
const ex=new Set(ns.banks[0]||[]);s.wr.forEach(id=>ex.add(id));s.cor.forEach(id=>ex.delete(id));ns.banks[0]=[...ex];
}
st=ns; saveSt(st).then(()=>render(‘r’));
}

function render(fv){
const root=document.getElementById(‘root’);if(!root) return;
if(sess&&fv!==‘r’) rQuiz(root);
else if(fv===‘r’&&sess) rResult(root);
else{sess=null;fb=null;rHome(root);}
}

function rHome(root){
const ov=st.ov||{c:0,w:0,n:0},pct=ov.n?Math.round(ov.c/ov.n*100):0;
let h=`<div class="hdr">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
<button class="rst" style="margin-top:0;font-size:11px" onclick="window.location.href='MGI Quiz Hub.html'">← 허브로</button>
<button class="rst" style="margin-top:0;font-size:11px;color:#888">👤 ${currentUser}</button>
</div>
<div class="hdr-title">[채총] 유니온 MGI Point</div>
<div class="hdr-count">총 ${QQ.length}문제 · 16개 주제 · 채권관계 보호의무 ~ 채무인수</div>

  </div>
  <div class="stat-row">
    <div class="sc"><div class="sv">${ov.n}</div><div class="sl">전체 시도</div></div>
    <div class="sc"><div class="sv ok">${ov.c}</div><div class="sl">정답</div></div>
    <div class="sc"><div class="sv er">${ov.w}</div><div class="sl">오답</div></div>
    <div class="sc"><div class="sv wa">${ov.n?pct+'%':'-'}</div><div class="sl">정답률</div></div>
  </div>
  <div class="sec">모드 선택</div>
  <div style="display:flex;gap:8px;margin-bottom:10px"><button class="btn btn-p" style="flex:1" onclick="start('rand')">🔀 무작위 100문제 풀기</button></div>
  <div class="rv">`;
  const lbs=['1차 오답','2차 오답','3차 오답','4차 오답','5차 오답'];
  for(let i=0;i<5;i++){const cnt=(st.banks[i]||[]).length,cls=cnt>0?'rb on':'rb',oc=cnt>0?`onclick="start('review',null,${i})"`:' ';h+=`<button class="${cls}" ${oc}>${lbs[i]}<br><span style="font-size:11px">${cnt}문제</span></button>`;}
  h+=`</div><div class="sec" style="margin-top:4px">주제별 풀기</div><div class="tg">`;
  T.forEach(t=>{const ts=st.tS[t.id]||{c:0,w:0,n:0},qc=QQ.filter(q=>q.topicId===t.id).length,p=ts.n?Math.round(ts.c/ts.n*100):null;
    h+=`<button class="tc" onclick="start('topic',${t.id})"><div class="tn">Topic ${t.id}</div><div class="tt">${t.n}</div><div class="ts"><span>${qc}문제</span>${ts.n?`<span class="ok">✓${ts.c}</span><span class="er">✗${ts.w}</span><span class="wa">${p}%</span>`:'<span style="color:#ccc">미풀이</span>'}</div></button>`;});
  h+=`</div><div style="text-align:center;margin-top:16px"><button class="rst" onclick="confirmReset()">전체 초기화</button></div>`;
  root.innerHTML=h;
}

function rQuiz(root){
const s=sess,q=fq(s.qs[s.idx]),tp=T.find(t=>t.id===q.topicId),total=s.qs.length,cur=s.idx+1,pct=Math.round(cur/total*100);
const ml=s.mode===‘topic’?`주제별 · ${tn(s.tid)}`:s.mode===‘rand’?‘무작위 100문제’:`${s.bi+1}차 오답 풀이`;
let fbH=’’;
if(fb){const ok=fb.ok,av=q.answer?‘O’:‘X’;fbH=`<div class="fb ${ok?'fbok':'fber'}"><div class="fbt ${ok?'ok':'er'}">${ok?'✓ 정답입니다':'✗ 오답 — 정답: '+av}</div>${q.explanation?`<div class="fbe">${q.explanation}</div>`:''}</div>`;}
const isL=cur>=total,btnH=fb?`<button class="btn btn-p" style="width:100%;padding:14px;font-size:15px" onclick="nxt()">${isL?'결과 보기 →':'다음 문제 →'}</button>`:`<div class="ab"><button class="bo" onclick="ans(true)">O</button><button class="bx" onclick="ans(false)">X</button></div>`;
root.innerHTML=`<div style="padding-top:10px">

  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><span style="font-size:12px;color:#888">${ml}</span><span style="font-size:12px;color:#888">${cur}/${total}</span></div>
  <div class="pb"><div class="pf" style="width:${pct}%"></div></div>
  <div class="pr"><span class="ok">✓ ${s.cor.length}</span><span class="er">✗ ${s.wr.length}</span><span>남은 ${total-s.idx-(fb?1:0)}문제</span></div>
  <div class="qc" style="margin-top:10px"><div class="qt">Topic ${tp?.id} · ${tp?.n}</div><div class="qq">${q.text}</div>${fbH}</div>
  ${btnH}
  <div style="text-align:center;margin-top:10px"><button class="rst" onclick="quit()">세션 종료</button></div></div>`;
}

function rResult(root){
const s=sess,total=s.qs.length,cor=s.cor.length,wr=s.wr.length,pct=total?Math.round(cor/total*100):0;
const ml=s.mode===‘topic’?tn(s.tid):s.mode===‘rand’?‘무작위 100문제’:`${s.bi+1}차 오답 풀이`;
const cm=pct===100?‘완벽합니다! 모든 문제를 맞혔습니다.’:pct>=80?‘훌륭합니다. 오답 문제를 재확인하세요.’:pct>=60?‘양호합니다. 오답 위주로 반복 학습하세요.’:‘오답 문제를 중심으로 반드시 재복습하세요.’;
const nbi=s.mode===‘review’?(s.bi+1):0,nct=(st.banks[nbi]||[]).length;
let wlH=’’;
if(s.wr.length>0){wlH=`<div class="sec" style="margin-bottom:7px">이번 오답 목록</div><div class="wl">`;s.wr.forEach(id=>{const q=fq(id);if(q)wlH+=`<div class="wi">${q.text}<div class="wa2">정답: ${q.answer?'O':'X'}${q.explanation?' — '+q.explanation:''}</div></div>`;});wlH+=`</div>`;}
let rvH=’’;
if(nct>0){const lbl=s.mode===‘review’?`${s.bi+2}차 오답 풀이`:‘1차 오답 풀이’;rvH=`<button class="btn btn-d" onclick="start('review',null,${nbi})" style="flex:1">${lbl} (${nct}문제)</button>`;}
root.innerHTML=`<div style="padding-top:14px">

  <div style="text-align:center"><div style="font-size:12px;color:#888;margin-bottom:5px">${ml} 완료</div><div class="rp">${pct}%</div><div class="rm">${cm}</div></div>
  <div class="rg"><div class="sc"><div class="sv">${total}</div><div class="sl">총 문제</div></div><div class="sc"><div class="sv ok">${cor}</div><div class="sl">정답</div></div><div class="sc"><div class="sv er">${wr}</div><div class="sl">오답</div></div></div>
  ${wr>0?`<div style="background:#fff5f5;border:1px solid #e57373;border-radius:10px;padding:12px 14px;margin-bottom:16px;font-size:13px;color:#c62828">이번 오답 ${wr}문제가 오답 뱅크에 추가되었습니다.</div>`:''}
  ${wlH}
  <div class="ar"><button class="btn btn-p" style="flex:1" onclick="goH()">홈으로</button>${rvH}</div></div>`;
}

function goH(){sess=null;fb=null;render();}
function quit(){fin();}
function confirmReset(){
if(confirm(‘이 과목의 학습 기록을 초기화하시겠습니까?’)){
st=cp(DS);saveSt(st).then(()=>{sess=null;fb=null;render();});
}
}

window.onload = init;

</script>
</body>
</html>
