<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"><title>테스트</title></head>
<body>
<div id="root">테스트 중...</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCrVPnha-pqrAyTYMdSvYP036HsJGJEMxw",
  authDomain: "union-mgipoint-ox-quiz.firebaseapp.com",
  databaseURL: "https://union-mgipoint-ox-quiz-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "union-mgipoint-ox-quiz",
  storageBucket: "union-mgipoint-ox-quiz.firebasestorage.app",
  messagingSenderId: "1187923060",
  appId: "1:1187923060:web:2cebb02a328f8d3c3c3d21"
};

try {
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const snap = await get(ref(db, 'quizzes'));
  document.getElementById('root').innerText = 'Firebase 연결 성공! 데이터: ' + JSON.stringify(snap.val());
} catch(e) {
  document.getElementById('root').innerText = '에러: ' + e.message;
}
</script>
</body>
</html>
